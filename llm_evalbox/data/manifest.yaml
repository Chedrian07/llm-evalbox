# Dataset manifest.
#
# Each entry lists files plus their license + citation. Files marked
# `bundled: true` ship with the package under `llm_evalbox/data/datasets/`
# and are loaded without any network access. For non-bundled future
# datasets, set a `url` (and ideally `sha256`) and they will be lazily
# downloaded into `~/.cache/llm-evalbox/datasets/<name>/`.
#
# Resolution order at runtime: bundled → cache dir → URL fetch.
#
# All bundled corpora here use permissive licenses (MIT / Apache-2.0 / CC).
# Sourced from the upstream datasets cited below; unmodified copies.

mmlu:
  bundled: true
  license: MIT
  citation: "Hendrycks et al. 2020 — Measuring Massive Multitask Language Understanding"
  source: "https://huggingface.co/datasets/cais/mmlu"
  files:
    - name: mmlu_test.jsonl
    - name: mmlu_dev.jsonl

